{{define "flash_banner"}}
{{with .Flash}}
<div class="flash-banner flash-warning max-w-3xl mx-auto" role="status">
    {{.}}
</div>
{{end}}
{{end}}

{{define "empty_state"}}
<div class="empty-state">
    <svg class="empty-state-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-2.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
    </svg>
    <p class="empty-state-title">{{.Title}}</p>
    {{with .Message}}<p class="empty-state-desc">{{.}}</p>{{end}}
    {{if .LinkURL}}
    <div class="mt-4">
        <a href="{{.LinkURL}}" class="btn-primary btn-sm">{{.LinkText}}</a>
    </div>
    {{end}}
</div>
{{end}}
