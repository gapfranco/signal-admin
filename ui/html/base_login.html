{{define "base"}}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Admin - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <meta name="csrf-token" content="{{.CSRFToken}}">
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased" style="font-family: Inter, ui-sans-serif, system-ui, sans-serif">

<div class="flex h-screen min-h-[32rem]">
    <div class="flex-1 flex flex-col justify-center items-center px-8 md:px-16">
        {{template "main" .}}
    </div>
    <div class="hidden lg:flex w-2/5 flex-shrink-0 bg-gradient-to-br from-navy-600 to-navy-900 items-center justify-center p-12">
        <div class="text-white text-center">
            <p class="text-3xl font-bold tracking-tight">Signal Admin</p>
            <p class="mt-3 text-navy-100 text-sm">Controle de instalações e clientes Signal</p>
        </div>
    </div>
</div>

</body>
</html>
{{end}}
