{{define "main"}}
<div class="page-form-narrow mt-12 md:mt-20">
    <div class="form-card p-8 shadow-lg">
        <div class="mb-6 text-center">
            <h2 class="text-2xl font-bold text-slate-900">Primeiro acesso</h2>
            <p class="text-slate-500 text-sm mt-1">Crie o usuário administrador para começar.</p>
        </div>

        {{if .Flash}}
        <div class="flash-banner flash-error mb-4" role="alert">{{.Flash}}</div>
        {{end}}

        <form action="/setup" method="POST" class="space-y-4">
            <input type='hidden' name='csrf_token' value='{{.CSRFToken}}'>

            <div>
                <label for="nome" class="block text-sm font-medium text-slate-800 mb-1">Nome completo</label>
                <input type="text" id="nome" name="nome" required autofocus class="form-control">
            </div>

            <div>
                <label for="usuario" class="block text-sm font-medium text-slate-800 mb-1">Usuário</label>
                <input type="text" id="usuario" name="usuario" required autocomplete="username" class="form-control">
            </div>

            <div>
                <label for="senha" class="block text-sm font-medium text-slate-800 mb-1">Senha</label>
                <input type="password" id="senha" name="senha" required autocomplete="new-password" class="form-control">
            </div>

            <button type="submit" class="btn-primary w-full mt-2">
                Criar conta e entrar
            </button>
        </form>
    </div>

    <div class="mt-8 text-center text-slate-400 text-xs">
        Signal Admin &bull; Configuração inicial
    </div>
</div>
{{end}}
