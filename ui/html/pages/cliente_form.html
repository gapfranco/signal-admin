{{define "main"}}
<script>
function validarCNPJ(cnpj) {
    cnpj = cnpj.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
    if (cnpj.length !== 14) return false;
    if (!/^\d$/.test(cnpj[12]) || !/^\d$/.test(cnpj[13])) return false;
    if ([...new Set(cnpj)].length === 1) return false;
    const val = c => c.charCodeAt(0) - 48;
    const dig = (s, ws) => { const r = ws.reduce((a,w,i) => a + val(s[i])*w, 0) % 11; return r < 2 ? 0 : 11-r; };
    const w1 = [5,4,3,2,9,8,7,6,5,4,3,2], w2 = [6,5,4,3,2,9,8,7,6,5,4,3,2];
    return dig(cnpj,w1) === parseInt(cnpj[12]) && dig(cnpj,w2) === parseInt(cnpj[13]);
}
function cnpjFeedback(input) {
    const v = input.value.trim();
    const hint = input.nextElementSibling;
    if (v === '') { input.classList.remove('border-red-400','border-green-500'); if(hint) hint.textContent=''; return; }
    if (validarCNPJ(v)) {
        input.classList.remove('border-red-400'); input.classList.add('border-green-500');
        if(hint) { hint.textContent='CNPJ válido'; hint.className='mt-1 text-xs text-green-600'; }
    } else {
        input.classList.remove('border-green-500'); input.classList.add('border-red-400');
        if(hint) { hint.textContent='CNPJ inválido'; hint.className='mt-1 text-xs text-red-500'; }
    }
}
</script>
<div class="page-form-wide">
    <div class="flex items-center gap-3 mb-6">
        <a href="/config/clientes" class="text-slate-400 hover:text-slate-700 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h2 class="text-xl font-semibold text-slate-900">
            {{if .Data.EditMode}}Alterar Cliente{{else}}Novo Cliente{{end}}
        </h2>
    </div>

    {{if .Flash}}
    <div class="flash-banner flash-error mb-4" role="alert">{{.Flash}}</div>
    {{end}}

    <div class="form-card">
        {{if .Data.EditMode}}
        <form action="/config/clientes/{{.Data.Cliente.ClienteID}}/edit" method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

            <div>
                <label for="nome" class="block text-sm font-medium text-slate-800 mb-1">Nome / Razão Social</label>
                <input type="text" id="nome" name="nome" value="{{.Data.Cliente.Nome}}" required autofocus class="form-control">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="cnpj" class="block text-sm font-medium text-slate-800 mb-1">CNPJ</label>
                    <input type="text" id="cnpj" name="cnpj" value="{{.Data.Cliente.CNPJ}}" onblur="cnpjFeedback(this)" class="form-control">
                    <p class="form-hint"></p>
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-800 mb-1">E-mail</label>
                    <input type="email" id="email" name="email" value="{{.Data.Cliente.Email}}" class="form-control">
                </div>
                <div>
                    <label for="telefone" class="block text-sm font-medium text-slate-800 mb-1">Telefone</label>
                    <input type="text" id="telefone" name="telefone" value="{{.Data.Cliente.Telefone}}" class="form-control">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-800 mb-1">Código</label>
                    <input type="text" value="{{.Data.Cliente.ClienteID}}" disabled class="form-control text-slate-400">
                    <p class="form-hint">Não pode ser alterado.</p>
                </div>
                <div>
                    <label for="valid_until" class="block text-sm font-medium text-slate-800 mb-1">Validade</label>
                    <input type="date" id="valid_until" name="valid_until" value="{{.Data.Cliente.ValidUntil}}" class="form-control">
                </div>
                <div>
                    <label for="status" class="block text-sm font-medium text-slate-800 mb-1">Status</label>
                    <select id="status" name="status" class="form-control">
                        <option value="active" {{if eq .Data.Cliente.Status "active"}}selected{{end}}>Ativo</option>
                        <option value="suspended" {{if eq .Data.Cliente.Status "suspended"}}selected{{end}}>Suspenso</option>
                        <option value="inactive" {{if eq .Data.Cliente.Status "inactive"}}selected{{end}}>Inativo</option>
                    </select>
                </div>
            </div>

            <div>
                <label for="observacao" class="block text-sm font-medium text-slate-800 mb-1">Observação</label>
                <textarea id="observacao" name="observacao" rows="3" class="form-control">{{.Data.Cliente.Observacao}}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Salvar</button>
                <a href="/config/clientes" class="btn-secondary">Cancelar</a>
            </div>
        </form>
        {{else}}
        <form action="/config/clientes/new" method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

            <div>
                <label for="nome" class="block text-sm font-medium text-slate-800 mb-1">Nome / Razão Social</label>
                <input type="text" id="nome" name="nome" value="{{with .Data.Cliente}}{{.Nome}}{{end}}" required autofocus class="form-control">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="cnpj" class="block text-sm font-medium text-slate-800 mb-1">CNPJ</label>
                    <input type="text" id="cnpj" name="cnpj" value="{{with .Data.Cliente}}{{.CNPJ}}{{end}}" onblur="cnpjFeedback(this)" class="form-control">
                    <p class="form-hint"></p>
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-800 mb-1">E-mail</label>
                    <input type="email" id="email" name="email" value="{{with .Data.Cliente}}{{.Email}}{{end}}" class="form-control">
                </div>
                <div>
                    <label for="telefone" class="block text-sm font-medium text-slate-800 mb-1">Telefone</label>
                    <input type="text" id="telefone" name="telefone" value="{{with .Data.Cliente}}{{.Telefone}}{{end}}" class="form-control">
                </div>
                <div>
                    <label for="cliente_id" class="block text-sm font-medium text-slate-800 mb-1">Código</label>
                    <input type="text" id="cliente_id" name="cliente_id" value="{{with .Data.Cliente}}{{.ClienteID}}{{end}}" required class="form-control">
                    <p class="form-hint">Identificador único (a-z, 0-9).</p>
                </div>
                <div>
                    <label for="valid_until" class="block text-sm font-medium text-slate-800 mb-1">Validade</label>
                    <input type="date" id="valid_until" name="valid_until" value="{{with .Data.Cliente}}{{.ValidUntil}}{{end}}" class="form-control">
                </div>
                <div>
                    <label for="status" class="block text-sm font-medium text-slate-800 mb-1">Status</label>
                    <select id="status" name="status" class="form-control">
                        <option value="active">Ativo</option>
                        <option value="suspended">Suspenso</option>
                        <option value="inactive">Inativo</option>
                    </select>
                </div>
            </div>

            <div>
                <label for="observacao" class="block text-sm font-medium text-slate-800 mb-1">Observação</label>
                <textarea id="observacao" name="observacao" rows="3" class="form-control">{{with .Data.Cliente}}{{.Observacao}}{{end}}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Criar Cliente</button>
                <a href="/config/clientes" class="btn-secondary">Cancelar</a>
            </div>
        </form>
        {{end}}
    </div>
</div>
{{end}}
