{{define "main"}}
<div class="page-form">
    <div class="flex items-center gap-3 mb-6">
        <a href="/config/usuarios" class="text-slate-400 hover:text-slate-700 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h2 class="text-xl font-semibold text-slate-900">
            {{if .Data.EditMode}}Alterar Usuário{{else}}Novo Usuário{{end}}
        </h2>
    </div>

    <div class="form-card">
        {{if .Data.EditMode}}
        <form action="/config/usuarios/{{.Data.User.ID}}/edit" method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

            <div>
                <label class="block text-sm font-medium text-slate-800 mb-1">Login</label>
                <input type="text" value="{{.Data.User.Usuario}}" disabled class="form-control text-slate-400">
                <p class="form-hint">O login não pode ser alterado.</p>
            </div>

            <div>
                <label for="nome" class="block text-sm font-medium text-slate-800 mb-1">Nome</label>
                <input type="text" id="nome" name="nome" value="{{.Data.User.Nome}}" required autofocus class="form-control">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Salvar</button>
                <a href="/config/usuarios" class="btn-secondary">Cancelar</a>
            </div>
        </form>
        {{else}}
        <form action="/config/usuarios/new" method="POST" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

            <div>
                <label for="usuario" class="block text-sm font-medium text-slate-800 mb-1">Login</label>
                <input type="text" id="usuario" name="usuario" required autofocus class="form-control">
                <p class="form-hint">Usado para acessar o sistema. Não pode ser alterado depois.</p>
            </div>

            <div>
                <label for="nome" class="block text-sm font-medium text-slate-800 mb-1">Nome</label>
                <input type="text" id="nome" name="nome" required class="form-control">
            </div>

            <div>
                <label for="senha" class="block text-sm font-medium text-slate-800 mb-1">Senha</label>
                <input type="password" id="senha" name="senha" required class="form-control">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Criar Usuário</button>
                <a href="/config/usuarios" class="btn-secondary">Cancelar</a>
            </div>
        </form>
        {{end}}
    </div>
</div>
{{end}}
